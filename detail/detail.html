<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Detail Project</title>

<link rel="stylesheet" href="../css/detail.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

    <!-- ================= FOTO PROJECT ================= -->

    <section class="hero-gallery">

        <div class="main-image">

            <img id="mainImage">

        </div>

        <div class="thumbs" id="thumbs">

        </div>

    </section>

    <!-- ================= INFORMASI PROJECT ================= -->

    <section class="product-info">

        <div class="left-info">

            <h1 id="title"></h1>

            <div class="price" id="price"></div>

            <div class="detail-item">

                <h3>Ukuran</h3>

                <p id="size"></p>

            </div>

            <div class="detail-item">

                <h3>Material</h3>

                <p id="material"></p>

            </div>

            <div class="detail-item">

                <h3>Deskripsi</h3>

                <p id="description"></p>

            </div>

        </div>

        <div class="right-info">

            <div class="contact-box">

                <h2>Tertarik dengan project ini?</h2>

                <p>Konsultasikan kebutuhan interior Anda bersama tim kami.</p>

                <a href="https://wa.me/628123456789"
                   class="btn-wa">
                    Konsultasi Sekarang
                </a>

            </div>

        </div>

    </section>

    <!-- ================= HASIL PROJECT ================= -->

    <section class="gallery-section">

        <h2>Hasil Pengerjaan</h2>

        <div class="image-grid" id="resultGallery">

        </div>

    </section>

    <!-- ================= DESAIN ================= -->

    <section class="gallery-section">

        <h2>Gambar Desain</h2>

        <div class="image-grid" id="designGallery">

        </div>

    </section>

    <!-- ================= BEFORE AFTER ================= -->

    <section class="gallery-section">

        <h2>Sebelum & Sesudah</h2>

        <div class="before-after-grid" id="beforeAfterGallery">

        </div>

    </section>

</div>

<script src="../js/detail.js"></script>

</body>

</html>
